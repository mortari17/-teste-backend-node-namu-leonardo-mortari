services:
  app:
    build: .
    container_name: namu_wellness_api
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DB_HOST: mysql
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_NAME: ${DB_NAME:-namu_wellness}
    depends_on:
      - mysql

  mysql:
    image: mysql:8
    container_name: namu_wellness_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-namu_wellness}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./seed.sql:/docker-entrypoint-initdb.d/seed.sql

volumes:
  mysql_data:
